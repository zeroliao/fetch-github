version: "3.3"

services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg15
    container_name: fetchgithub-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: fetchgithub
      POSTGRES_USER: fetchgithub
      POSTGRES_PASSWORD: fetchgithub
    volumes:
      - fetchgithub-postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fetchgithub -d fetchgithub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fetchgithub-postgres-data:
